<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Seleção de perfil Netflix">
    <title>Alurix - Selecionar Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
    </header>

    <main>
        <section class="profiles">
            <h2>Selecione um perfil</h2>
            <ul class="profiles-list">            
                <li class="profile">
                    <button aria-label="Selecionar perfil João">
                        <figure>
                            <img src="assests/perfil-6.jpg" alt="Foto de perfil de João, ilustração em estilo anime de Roronoa Zoro, de One Piece, com cabelo verde e três katanas, posicionado no convés de um navio ao pôr do sol.">
                            <figcaption>João</figcaption>
                        </figure>
                    </button>
                </li>
                <li class="profile">
                    <button aria-label="Selecionar perfil Dudu">
                        <figure>
                            <img src="assests/perfil-5.jpg" alt="Foto de perfil de Dudu, retrato em preto e branco com filtro halftone e fundo verde limão, onde Gene Simmons, da banda KISS, encare o espectador. O músico está caracterizado como 'The Demon', com sua maquiagem de morcego no rosto, cabelo preto desgrenhado e colete de couro com espinhos e fivelas. A imagem tem textura granulada e um rasgo vertical cru à esquerda.">
                            <figcaption>Dudu</figcaption>
                        </figure>
                    </button>
                </li>
                <li class="profile">
                    <button aria-label="Selecionar perfil Maria">
                        <figure>
                            <img src="assests/perfil-2.jpg" alt="Foto de perfil de Maria, personagem feminina apresenta uma com uma pele de argila azul-acinzentada, com cabelo curto e encaracolado preto, olhos arregalados e lábios rosados">
                            <figcaption>Maria</figcaption>
                        </figure>
                    </button>
                </li>
                <li class="profile">
                    <button aria-label="Selecionar perfil Marcos">
                        <figure>
                            <img src="assests/perfil-4.jpg" alt="Foto de perfil de Marcos, Evil Morty em versão steampunk realista, com cabelo castanho bem penteado, usando um tapa-olho preto e um monóculo tecnológico no olho direito, com traje vitoriano detalhado por engrenagens, relógios de bolso e tubos de ensaio.">
                            <figcaption>Marcos</figcaption>
                        </figure>
                    </button>
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Alurix. Todos os direitos reservados <a href= "https://github.com/EduardoSoares33" target="_blank" rel="noopener noreferrer"">Eduardo Santos</a>.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
